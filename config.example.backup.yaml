# Matrix Bridge - Backup mode configuration
#
# Backup mode: save all messages + media to local storage without forwarding.
# The bot joins rooms on a single server and records everything it sees.

logging:
  level: INFO
  file: ""                   # Log file path (empty = stdout only)
  max_bytes: 10485760        # Log rotation size in bytes (default 10MB)
  backup_count: 3            # Number of rotated log files to keep

source:
  homeserver: "https://matrix.example.com"
  user_id: "@backup-bot:example.com"
  access_token: ""
  password: ""
  device_id: ""                # Leave empty to let the server assign one (auto-saved back)
  store_path: "./store/source"
  handle_encrypted: true
  media_max_size: 52428800
  key_import_file: ""
  key_import_passphrase: ""

# No "target" section - this activates backup mode.

bridge:
  state_path: "state.json"

  media:
    enabled: true

  call_notifications:
    enabled: true

  message_store:
    enabled: true              # Required for backup mode
    path: "messages.db"
    media_dir: "./media"       # Local directory to save downloaded media files

  web:
    enabled: false             # Set to true to enable the web search interface
    host: "0.0.0.0"
    port: 8080
    password: ""               # Required for non-localhost access; leave empty to bind 127.0.0.1 only
    trusted_proxy: false       # Set to true when behind a reverse proxy (reads real IP from X-Forwarded-For)
    # WARNING: This interface has no TLS support. For remote access, place it behind a
    # TLS-terminating reverse proxy (e.g. Nginx, Caddy). Never expose it directly to the internet.
